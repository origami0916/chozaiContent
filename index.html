<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コンテンツオーケストラ — 制作管理</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎼</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Cormorant+Garamond:ital,wght@0,600;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060b;--bg2:#0c0c14;--s:#111119;--s2:#17171f;--bd:#222233;--bd2:#2e2e44;--t:#dddde8;--t2:#9999ae;--t3:#5e5e72;--w:#f0f0f8;--gold:#c9a84c;--gold-d:rgba(201,168,76,.12);--blue:#5a7aff;--cyan:#00c8dd;--green:#10b981;--green-d:rgba(16,185,129,.12);--red:#ef4444;--orange:#f59e0b;--purple:#a855f7;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--t);line-height:1.65;min-height:100vh}

/* === HEADER === */
.hd{padding:48px 24px 36px;text-align:center;border-bottom:1px solid var(--bd);background:linear-gradient(180deg,rgba(201,168,76,.03),transparent)}
.hd-ey{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.hd h1{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,5vw,48px);font-weight:600;color:var(--w);margin-bottom:6px}
.hd h1 em{font-style:italic;color:var(--gold)}
.hd-sub{font-size:13px;color:var(--t2);max-width:540px;margin:0 auto}

/* Connection */
.conn{font-family:'JetBrains Mono',monospace;font-size:10px;margin-top:10px;display:inline-flex;align-items:center;gap:6px;padding:3px 12px;border-radius:20px;border:1px solid var(--bd)}
.conn-dot{width:7px;height:7px;border-radius:50%}
.conn.loading .conn-dot{background:var(--orange);animation:bk 1s infinite}
.conn.ok .conn-dot{background:var(--green)}.conn.ok{border-color:rgba(16,185,129,.3);color:var(--green)}
.conn.err .conn-dot{background:var(--red)}.conn.err{border-color:rgba(239,68,68,.3);color:var(--red)}
.conn.local .conn-dot{background:var(--orange)}.conn.local{border-color:rgba(245,158,11,.3);color:var(--orange)}

/* Settings panel */
.stog{font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 16px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;transition:all .2s;margin-top:8px}.stog:hover{border-color:var(--gold);color:var(--gold)}
.sp{max-height:0;overflow:hidden;transition:max-height .3s;max-width:600px;margin:0 auto}.sp.open{max-height:300px;margin-top:14px}
.sp-in{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px}
.sp-lb{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:1px;margin-bottom:6px}
.sp-row{display:flex;gap:8px;align-items:center}
.sp-input{flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t);outline:none}.sp-input:focus{border-color:var(--gold)}.sp-input::placeholder{color:var(--t3)}
.sp-save{font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 20px;border-radius:6px;border:none;background:var(--gold);color:var(--bg);cursor:pointer;font-weight:500}
.sp-msg{font-size:11px;margin-top:8px;font-family:'JetBrains Mono',monospace}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:8px 16px;border-radius:8px;font-size:11px;font-family:'JetBrains Mono',monospace;z-index:999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.ok{background:var(--green);color:#fff}.toast.fail{background:var(--red);color:#fff}

/* Now box */
.now{max-width:600px;margin:24px auto 0}
.now-lb{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:5px;display:flex;align-items:center;gap:8px}
.now-lb::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--gold);animation:bk 1.6s ease-in-out infinite}
@keyframes bk{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(201,168,76,.5)}50%{opacity:.6;box-shadow:0 0 0 7px rgba(201,168,76,0)}}
.now-in{width:100%;background:var(--s);border:2px solid var(--bd2);border-radius:var(--r);padding:13px 16px;font-family:'Noto Sans JP',sans-serif;font-size:20px;font-weight:700;color:var(--w);text-align:center;outline:none;transition:border-color .3s,box-shadow .3s}
.now-in::placeholder{color:var(--t3);font-weight:400;font-size:15px}.now-in:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-d)}

/* Progress */
.gp{max-width:600px;margin:18px auto 0;display:flex;align-items:center;gap:12px}
.gp-tr{flex:1;height:5px;border-radius:3px;background:var(--bd);overflow:hidden}
.gp-fl{height:100%;width:0%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .5s}
.gp-lb{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2);white-space:nowrap}

/* Stats */
.sts{display:flex;justify-content:center;gap:28px;margin-top:18px;flex-wrap:wrap}
.st{text-align:center}.st-n{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500}.st-l{font-size:10px;letter-spacing:1px;color:var(--t3);text-transform:uppercase}

/* Buttons */
.ex-bar{display:flex;justify-content:center;gap:10px;margin-top:18px;flex-wrap:wrap}
.ex-btn{font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 16px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;transition:all .2s}.ex-btn:hover{border-color:var(--gold);color:var(--gold)}

/* Filter */
.fb{position:sticky;top:0;z-index:100;background:rgba(6,6,11,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fb-b{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 12px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;transition:all .2s}.fb-b:hover{border-color:var(--gold);color:var(--gold)}.fb-b.on{background:var(--gold-d);border-color:var(--gold);color:var(--gold)}
.fb-s{margin-left:auto;background:var(--s);border:1px solid var(--bd);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--t);outline:none;width:160px;font-family:'Noto Sans JP',sans-serif}.fb-s:focus{border-color:var(--gold)}

/* Main */
.mn{max-width:1000px;margin:0 auto;padding:20px 16px 100px}

/* Chapter */
.ch{margin-bottom:32px}
.ch-h{display:flex;align-items:center;gap:12px;padding:14px 0 8px;border-bottom:1px solid var(--bd);margin-bottom:10px;cursor:pointer;user-select:none}
.ch-badge{font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:600;color:var(--gold);border:1px solid rgba(201,168,76,.3);border-radius:6px;padding:2px 9px;flex-shrink:0}
.ch-t{font-size:15px;font-weight:700;color:var(--w);flex:1}
.ch-p{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3)}
.ch-tog{font-size:10px;color:var(--t3);transition:transform .2s}
.ch.clp .ch-tog{transform:rotate(-90deg)}.ch.clp .ch-bd{display:none}

/* Section */
.sg{margin-left:10px;padding-left:12px;border-left:2px solid var(--bd);margin-bottom:14px}
.sg-lb{font-size:12px;font-weight:600;color:var(--t2);padding:6px 0 4px}

/* Item */
.it{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:5px;overflow:hidden;transition:border-color .2s,opacity .3s}.it:hover{border-color:var(--bd2)}.it.ad{opacity:.4}
.it-h{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;min-height:44px}
.it-id{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);width:46px;flex-shrink:0}
.it-pri{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;border-radius:4px;flex-shrink:0;cursor:pointer;transition:all .2s;border:1px solid transparent;user-select:none}
.pri-high{background:rgba(239,68,68,.15);color:var(--red);border-color:rgba(239,68,68,.3)}
.pri-mid{background:rgba(245,158,11,.12);color:var(--orange);border-color:rgba(245,158,11,.3)}
.pri-low{background:rgba(100,100,140,.1);color:var(--t3);border-color:rgba(100,100,140,.2)}
.pri-none{background:transparent;color:var(--t3);border:1px dashed var(--bd)}
.it-nm{flex:1;font-size:13px;font-weight:500;color:var(--w);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.it.ad .it-nm{text-decoration:line-through;text-decoration-color:var(--t3)}
.it-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);flex-shrink:0}
.wd{display:flex;gap:2px;flex-shrink:0}
.wd-d{width:7px;height:7px;border-radius:2px;background:var(--bd);transition:background .2s}.wd-d.dn{background:var(--green)}.wd-d.lk{opacity:.4}
.it-ch{font-size:9px;color:var(--t3);transition:transform .2s;flex-shrink:0}.it.op .it-ch{transform:rotate(90deg)}
.it-dt{max-height:0;overflow:hidden;transition:max-height .4s ease}.it.op .it-dt{max-height:8000px}
.dt-in{padding:12px 14px 14px;border-top:1px solid var(--bd)}

/* Workflow step */
.wf{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03)}.wf:last-child{border-bottom:none}
.wf-ck{width:20px;height:20px;border-radius:5px;border:2px solid var(--bd2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.wf-ck:hover{border-color:var(--green);background:var(--green-d)}
.wf-ck.on{border-color:var(--green);background:var(--green)}.wf-ck.on::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.wf-ck.lk{border-color:var(--bd);background:rgba(40,40,55,.5);cursor:not-allowed;opacity:.4}.wf-ck.lk:hover{border-color:var(--bd);background:rgba(40,40,55,.5)}.wf-ck.lk::after{content:'🔒';font-size:9px}
.wf-i{flex:1;min-width:0}
.wf-tl{font-size:12px;font-weight:600;color:var(--t);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.wf-tl .tg{font-family:'JetBrains Mono',monospace;font-size:8px;padding:1px 6px;border-radius:3px;letter-spacing:.5px}
.tg-d{background:rgba(245,158,11,.15);color:var(--orange)}.tg-c{background:rgba(16,185,129,.15);color:var(--green)}.tg-r{background:rgba(99,102,241,.15);color:var(--blue)}.tg-y{background:rgba(239,68,68,.15);color:var(--red)}.tg-s{background:rgba(90,122,255,.15);color:var(--blue)}.tg-n{background:rgba(168,85,247,.15);color:var(--purple)}.tg-f{background:rgba(0,200,221,.15);color:var(--cyan)}
.wf-sb{font-size:10px;color:var(--t3);margin-top:1px}
.wf-ts{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--green);margin-top:2px}
.wf-lk-msg{font-size:10px;color:var(--t3);font-style:italic;margin-top:2px}
.wf-link-row{display:flex;gap:6px;margin-top:4px;align-items:center}
.wf-link-in{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:3px 8px;font-size:10px;color:var(--t);font-family:'JetBrains Mono',monospace;outline:none}.wf-link-in:focus{border-color:var(--gold)}.wf-link-in::placeholder{color:var(--t3)}
.wf-link-go{font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-family:'JetBrains Mono',monospace;transition:all .2s;text-decoration:none}.wf-link-go:hover{border-color:var(--cyan);color:var(--cyan)}
.wf-pb{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 9px;border-radius:4px;border:1px solid var(--bd);background:transparent;color:var(--t3);cursor:pointer;transition:all .2s;flex-shrink:0;margin-top:1px}.wf-pb:hover{border-color:var(--gold);color:var(--gold)}
.wf-pm{max-height:0;overflow:hidden;transition:max-height .3s,margin .3s}.wf-pm.op{max-height:2000px;margin-top:6px}
.wf-pi{background:var(--s);border:1px solid var(--bd);border-radius:7px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;color:#b8b8cc;white-space:pre-wrap;word-break:break-all;position:relative}
.wf-cp{position:absolute;top:6px;right:6px;font-size:9px;padding:2px 8px;border-radius:4px;border:1px solid var(--bd);background:var(--bg2);color:var(--t3);cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .2s}.wf-cp:hover{border-color:var(--gold);color:var(--gold)}.wf-cp.ok{border-color:var(--green);color:var(--green)}
.it-nw{margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}.it-nl{font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;letter-spacing:1px;margin-bottom:3px}
.it-nt{width:100%;background:var(--s);border:1px solid var(--bd);border-radius:5px;padding:6px 8px;font-size:11px;color:var(--t);font-family:'Noto Sans JP',sans-serif;outline:none;resize:vertical;min-height:32px}.it-nt:focus{border-color:var(--gold)}
.ft{text-align:center;padding:28px 20px;font-size:10px;color:var(--t3);border-top:1px solid var(--bd)}
.hidden{display:none!important}
.loading-ov{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}.loading-ov.gone{display:none}
.loading-spinner{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}.loading-text{font-size:13px;color:var(--t2)}
@media(max-width:640px){.it-id{width:36px;font-size:8px}.it-nm{font-size:12px}.wd-d{width:5px;height:5px}.sts{gap:14px}.fb-s{width:100px}}
</style>
</head>
<body>
<div class="loading-ov" id="lo"><div class="loading-spinner"></div><div class="loading-text">データを読み込み中…</div></div>
<div class="toast" id="toast"></div>

<div class="hd">
  <div class="hd-ey">Content Orchestra</div>
  <h1>調剤報酬ガイド <em>制作管理</em></h1>
  <p class="hd-sub">静的HTML + GAS + スプレッドシート</p>
  <div class="conn loading" id="conn"><div class="conn-dot"></div><span id="conn-text">接続中…</span></div>
  <button class="stog" onclick="document.getElementById('sp').classList.toggle('open')">⚙ GAS設定</button>
  <div class="sp" id="sp"><div class="sp-in">
    <div class="sp-lb">GAS DEPLOY URL</div>
    <div class="sp-row"><input type="text" class="sp-input" id="gas-input" placeholder="https://script.google.com/macros/s/.../exec"><button class="sp-save" onclick="saveGasUrl()">接続</button></div>
    <div class="sp-msg" id="sp-msg"></div>
  </div></div>
  <div class="now"><div class="now-lb">NOW WORKING ON</div><input type="text" class="now-in" id="now-task" placeholder="今やっていることを入力…" oninput="debounceNow()"></div>
  <div class="gp"><div class="gp-tr"><div class="gp-fl" id="gp-fl"></div></div><div class="gp-lb" id="gp-lb">0%</div></div>

    <div class="st"><div class="st-n" id="s-tot" style="color:var(--w)">0</div><div class="st-l">全項目</div></div>
    <div class="st"><div class="st-n" id="s-dn" style="color:var(--green)">0</div><div class="st-l">完了</div></div>
    <div class="st"><div class="st-n" id="s-wp" style="color:var(--orange)">0</div><div class="st-l">作業中</div></div>
    <div class="st"><div class="st-n" id="s-td" style="color:var(--t3)">0</div><div class="st-l">未着手</div></div>
  </div>

</div>
<div class="fb">
  <button class="fb-b on" onclick="setF('all',this)">ALL</button><button class="fb-b" onclick="setF('todo',this)">未着手</button><button class="fb-b" onclick="setF('wip',this)">作業中</button><button class="fb-b" onclick="setF('done',this)">完了</button>
  <button class="fb-b" onclick="setF('high',this)">🔴高</button><button class="fb-b" onclick="setF('mid',this)">🟡中</button><button class="fb-b" onclick="setF('low',this)">⚪低</button>
  <input type="text" class="fb-s" placeholder="検索…" oninput="searchQ=this.value;applyVis()">
</div>

<script>
// ===================================================================
//  GAS URL（localStorageに保存）
// ===================================================================
let GAS_URL = localStorage.getItem('ov5_gas_url') || '';

// ===================================================================
//  JSONP通信（CORSフリー — scriptタグ経由）
// ===================================================================
let _jc = 0;

// GASにGETリクエスト（データ取得）
function jsonpGet() {
  return new Promise((ok, ng) => {
    if (!GAS_URL) return ng('No URL');
    const cb = '_cb' + (_jc++);
    const s = document.createElement('script');
    window[cb] = d => { delete window[cb]; s.remove(); ok(d); };
    s.onerror = () => { delete window[cb]; s.remove(); ng('Load error'); };
    s.src = GAS_URL + '?action=getAll&callback=' + cb;
    document.head.appendChild(s);
  });
}

// GASにデータ書き込み（POST-via-GET: データをURLパラメータで送信）
function jsonpPost(body) {
  return new Promise((ok, ng) => {
    if (!GAS_URL) return ng('No URL');
    const cb = '_cb' + (_jc++);
    const s = document.createElement('script');
    window[cb] = d => { delete window[cb]; s.remove(); ok(d); };
    s.onerror = () => { delete window[cb]; s.remove(); ng('Load error'); };
    s.src = GAS_URL + '?action=post&callback=' + cb + '&data=' + encodeURIComponent(JSON.stringify(body));
    document.head.appendChild(s);
  });
}

// 書き込みを送信（fire-and-forget + toast）
function send(body) {
  if (!GAS_URL) { svL(); return; }
  jsonpPost(body).then(r => {
    if (r && r.ok) showToast('保存OK', 'ok');
    else showToast('保存エラー', 'fail');
  }).catch(() => { showToast('通信エラー（ローカル保存済）', 'fail'); svL(); });
}

function showToast(m, t) { const e = document.getElementById('toast'); e.textContent = m; e.className = 'toast ' + t + ' show'; setTimeout(() => e.classList.remove('show'), 2000); }

// ===================================================================
//  静的データ（目次構造）
// ===================================================================

// ===================================================================
//  ローカルステート
// ===================================================================
let checks={},links={},pris={},nts={},curF='all',searchQ='';
const L={c:'o5c',l:'o5l',p:'o5p',n:'o5n',w:'o5w'};
function gL(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch(e){return{}}}
function svL(){try{localStorage.setItem(L.c,JSON.stringify(checks));localStorage.setItem(L.l,JSON.stringify(links));localStorage.setItem(L.p,JSON.stringify(pris));localStorage.setItem(L.n,JSON.stringify(nts))}catch(e){}}

// ===================================================================
//  初期ロード
// ===================================================================
async function init(){
  const ce=document.getElementById('conn'),ct=document.getElementById('conn-text');
  if(!GAS_URL){
    ce.className='conn local';ct.textContent='GAS未接続（⚙設定からURL入力）';
    checks=gL(L.c);links=gL(L.l);pris=gL(L.p);nts=gL(L.n);
    try{const v=localStorage.getItem(L.w);if(v)document.getElementById('now-task').value=v}catch(e){}
    document.getElementById('sp').classList.add('open');
    render();document.getElementById('lo').classList.add('gone');return;
  }
  try{
    const d=await jsonpGet();
    ce.className='conn ok';ct.textContent='GAS接続OK ✓';
    if(d.items)d.items.forEach(it=>{
      if(it.checks&&Object.keys(it.checks).length)checks[it.id]=it.checks;
      if(it.links&&Object.keys(it.links).length)links[it.id]=it.links;
      if(it.priority&&it.priority!=='none')pris[it.id]=it.priority;
      if(it.note)nts[it.id]=it.note;
    });
    if(d.nowTask)document.getElementById('now-task').value=d.nowTask;
    svL();
  }catch(e){
    ce.className='conn err';ct.textContent='GAS接続エラー（ローカル動作中）';
    checks=gL(L.c);links=gL(L.l);pris=gL(L.p);nts=gL(L.n);
    try{const v=localStorage.getItem(L.w);if(v)document.getElementById('now-task').value=v}catch(e){}
  }
  render();document.getElementById('lo').classList.add('gone');
}
function reload(){document.getElementById('lo').classList.remove('gone');checks={};links={};pris={};nts={};init().then(()=>showToast('再読み込み完了','ok'))}

function saveGasUrl(){
  const u=document.getElementById('gas-input').value.trim(),m=document.getElementById('sp-msg');
  if(!u){m.style.color='var(--red)';m.textContent='URLを入力';return}
  if(!u.startsWith('https://script.google.com/')){m.style.color='var(--red)';m.textContent='GASのURLではありません';return}
  localStorage.setItem('ov5_gas_url',u);GAS_URL=u;
  m.style.color='var(--gold)';m.textContent='接続テスト中…';
  setTimeout(()=>{document.getElementById('sp').classList.remove('open');checks={};links={};pris={};nts={};init()},400);
}

// ===================================================================
//  ヘルパー
// ===================================================================
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function fmtD(ts){const d=new Date(ts);return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function isLk(id,w){return w.deps.some(d=>!(checks[id]||{})[d])}
function lkMsg(id,w){return '前提：'+w.deps.filter(d=>!(checks[id]||{})[d]).map(d=>(WF.find(x=>x.key===d)||{}).label||d).join('、')+'を先に完了'}
const PC=['none','high','mid','low'],PL={none:'—',high:'高',mid:'中',low:'低'};

// ===================================================================
//  レンダリング
// ===================================================================
function render(){
  let h='';
  DATA.forEach((ch,ci)=>{
    h+='<div class="ch" id="ch'+ci+'"><div class="ch-h" onclick="document.getElementById(\'ch'+ci+'\').classList.toggle(\'clp\')"><div class="ch-badge">'+ch.ch+'</div><div class="ch-t">'+ch.title+'</div><div class="ch-p" id="chp'+ci+'"></div><div class="ch-tog">▼</div></div><div class="ch-bd">';
    ch.sections.forEach(s=>{
      h+='<div class="sg"><div class="sg-lb">'+s.sec+'　'+s.title+'</div>';
      s.items.forEach(it=>{
        const id=it.id,ic=checks[id]||{},dc=WF.filter(w=>ic[w.key]).length,ad=dc===WF.length,st=dc===0?'todo':ad?'done':'wip',pr=pris[id]||'none';
        let lt=0;Object.values(ic).forEach(v=>{if(typeof v==='number'&&v>lt)lt=v});
        let vi=true;
        if(curF==='todo'&&st!=='todo')vi=false;if(curF==='wip'&&st!=='wip')vi=false;if(curF==='done'&&st!=='done')vi=false;
        if(curF==='high'&&pr!=='high')vi=false;if(curF==='mid'&&pr!=='mid')vi=false;if(curF==='low'&&pr!=='low')vi=false;
        if(searchQ&&!it.name.includes(searchQ)&&!id.includes(searchQ))vi=false;
        h+='<div class="it '+(ad?'ad':'')+' '+(vi?'':'hidden')+'" data-id="'+id+'" data-st="'+st+'" data-pri="'+pr+'"><div class="it-h" onclick="this.parentElement.classList.toggle(\'op\')"><div class="it-id">'+id+'</div><div class="it-pri pri-'+pr+'" onclick="event.stopPropagation();cyP(\''+id+'\')">'+PL[pr]+'</div><div class="it-nm">'+it.name+'</div>';
        if(lt)h+='<div class="it-date">'+fmtD(lt)+'</div>';
        h+='<div class="wd">';WF.forEach(w=>{const dn=ic[w.key],lk=!dn&&isLk(id,w);h+='<div class="wd-d '+(dn?'dn':'')+' '+(lk?'lk':'')+'"></div>'});
        h+='</div><div class="it-ch">▶</div></div><div class="it-dt"><div class="dt-in">';
        WF.forEach(w=>{
          const dn=ic[w.key],lk=!dn&&isLk(id,w),ts=dn&&typeof ic[w.key]==='number'?ic[w.key]:null;
          const pm=w.prompt.replace(/\{ITEM\}/g,it.name),ln=(links[id]||{})[w.key]||'';
          h+='<div class="wf">';
          h+=lk?'<div class="wf-ck lk"></div>':'<div class="wf-ck '+(dn?'on':'')+'" onclick="event.stopPropagation();togW(\''+id+"','"+w.key+"')\"></div>";
          h+='<div class="wf-i"><div class="wf-tl">'+w.label+' <span class="tg '+w.tc+'">'+w.tag+'</span></div><div class="wf-sb">'+w.sub+'</div>';
          if(ts)h+='<div class="wf-ts">✓ '+fmtD(ts)+'</div>';
          if(lk)h+='<div class="wf-lk-msg">'+lkMsg(id,w)+'</div>';
          h+='<div class="wf-link-row"><input class="wf-link-in" placeholder="成果物URL…" value="'+esc(ln)+'" onchange="svLn(\''+id+"','"+w.key+'\',this.value)" onclick="event.stopPropagation()">';
          if(ln)h+='<a class="wf-link-go" href="'+esc(ln)+'" target="_blank" onclick="event.stopPropagation()">Open</a>';
          h+='</div><div class="wf-pm" id="pm-'+id+'-'+w.key+'"><div class="wf-pi"><button class="wf-cp" onclick="event.stopPropagation();cpB(this)">COPY</button>'+esc(pm)+'</div></div></div>';
          h+='<button class="wf-pb" onclick="event.stopPropagation();document.getElementById(\'pm-'+id+'-'+w.key+"').classList.toggle('op')\">Prompt</button></div>";
        });
        h+='<div class="it-nw"><div class="it-nl">MEMO</div><textarea class="it-nt" placeholder="メモ…" onchange="svNt(\''+id+'\',this.value)" onclick="event.stopPropagation()">'+esc(nts[id]||'')+'</textarea></div>';
        h+='</div></div></div>';
      });h+='</div>';
    });h+='</div></div>';
  });
  document.getElementById('mn').innerHTML=h;updS();
}

// ===================================================================
//  アクション
// ===================================================================
function togW(id,k){
  if(!checks[id])checks[id]={};
  if(checks[id][k]){delete checks[id][k];WF.forEach(w=>{if(w.deps.includes(k)&&checks[id][w.key])delete checks[id][w.key]});send({action:'updateCheck',itemId:id,stepKey:k,checked:false,timestamp:0});WF.forEach(w=>{if(w.deps.includes(k))send({action:'updateCheck',itemId:id,stepKey:w.key,checked:false,timestamp:0})})}
  else{const t=Date.now();checks[id][k]=t;send({action:'updateCheck',itemId:id,stepKey:k,checked:true,timestamp:t})}
  svL();render();
}
function cyP(id){const c=pris[id]||'none',n=PC[(PC.indexOf(c)+1)%PC.length];pris[id]=n;send({action:'updatePriority',itemId:id,priority:n});svL();const b=document.querySelector('.it[data-id="'+id+'"] .it-pri');if(b){b.className='it-pri pri-'+n;b.textContent=PL[n]}}
function svLn(id,k,v){if(!links[id])links[id]={};links[id][k]=v;send({action:'updateLink',itemId:id,stepKey:k,url:v});svL()}
function svNt(id,v){nts[id]=v;send({action:'updateNote',itemId:id,note:v});svL()}
let _nt;function debounceNow(){clearTimeout(_nt);_nt=setTimeout(()=>{const v=document.getElementById('now-task').value;send({action:'updateNow',value:v});try{localStorage.setItem(L.w,v)}catch(e){}},1000)}

// ===================================================================
//  フィルタ・統計・コピー・エクスポート
// ===================================================================
function setF(f,b){curF=f;document.querySelectorAll('.fb-b').forEach(x=>x.classList.remove('on'));b.classList.add('on');applyVis()}
function applyVis(){document.querySelectorAll('.it').forEach(e=>{const s=e.dataset.st,p=e.dataset.pri,nm=e.querySelector('.it-nm').textContent,id=e.dataset.id;let v=1;if(curF==='todo'&&s!=='todo')v=0;if(curF==='wip'&&s!=='wip')v=0;if(curF==='done'&&s!=='done')v=0;if(curF==='high'&&p!=='high')v=0;if(curF==='mid'&&p!=='mid')v=0;if(curF==='low'&&p!=='low')v=0;if(searchQ&&!nm.includes(searchQ)&&!id.includes(searchQ))v=0;e.classList.toggle('hidden',!v)})}
function updS(){let tot=0,dn=0,wp=0,td=0,tc=0,dc=0;DATA.forEach((ch,ci)=>{let ct=0,cd=0;ch.sections.forEach(s=>s.items.forEach(it=>{tot++;ct++;const ic=checks[it.id]||{},d=WF.filter(w=>ic[w.key]).length;tc+=WF.length;dc+=d;if(!d)td++;else if(d===WF.length){dn++;cd++}else wp++}));const e=document.getElementById('chp'+ci);if(e)e.textContent=cd+'/'+ct});document.getElementById('s-tot').textContent=tot;document.getElementById('s-dn').textContent=dn;document.getElementById('s-wp').textContent=wp;document.getElementById('s-td').textContent=td;const p=tc?Math.round(dc/tc*100):0;document.getElementById('gp-fl').style.width=p+'%';document.getElementById('gp-lb').textContent=p+'%'}
function cpB(b){const bl=b.parentElement,cl=bl.cloneNode(true);cl.querySelectorAll('.wf-cp').forEach(x=>x.remove());const tx=cl.textContent.trim();const ta=document.createElement('textarea');ta.value=tx;ta.setAttribute('readonly','');ta.style.cssText='position:fixed;left:-9999px;opacity:0';document.body.appendChild(ta);ta.select();let ok=0;try{ok=document.execCommand('copy')}catch(e){}document.body.removeChild(ta);if(ok){b.textContent='✓';b.classList.add('ok');setTimeout(()=>{b.textContent='COPY';b.classList.remove('ok')},1500)}else if(navigator.clipboard){navigator.clipboard.writeText(tx).then(()=>{b.textContent='✓';b.classList.add('ok');setTimeout(()=>{b.textContent='COPY';b.classList.remove('ok')},1500)}).catch(()=>{b.textContent='選択済→Ctrl+C';setTimeout(()=>{b.textContent='COPY'},3000)})}}
function exportJSON(){const d={checks,links,pris,nts,now:document.getElementById('now-task').value,at:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='orchestra_'+new Date().toISOString().slice(0,10)+'.json';a.click()}

// ===================================================================
//  起動
// ===================================================================
document.getElementById('gas-input').value=GAS_URL;
if(!GAS_URL)document.getElementById('sp').classList.add('open');
init();
</script>
